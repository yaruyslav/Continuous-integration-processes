name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:

    # 1. Забирання коду
    - name: Checkout
      uses: actions/checkout@v3

    # 2. Встановлення Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    # 3. Встановлення залежностей
    - name: Install deps
      run: |
        pip install -r requirements.txt

    # задача 2: Linting
    - name: Lint code
      run: flake8 app tests

    # задача 1, 5: Тести та HTML звіт
    - name: Run tests
      run: |
        PYTHONPATH=. pytest --html=report.html --self-contained-html

    # зберігання звіту
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: report.html

  # задача 4: Docker
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t my-app .
